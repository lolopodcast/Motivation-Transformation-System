  m5_nav:"5. 改變動機的阻力",m5_title:"Resistance to Transformation：改變動機的阻力與成效評估",
  m5_p1:"改變動機是一段充滿阻力的旅程。這套 Resistance to Transformation 系統的價值，不只在於「順利時的學習路徑」，更在於「遇到阻力時的回應機制」。認識阻力、理解根因、找到策略，才能讓動機轉換真正發生。同時，我們需要明確的評估指標，才能知道這套系統是否真正發揮了效果。",

    {q:"以下哪個成效指標屬於「質化指標」？",opts:["投遞履歷數","獲得面試數","學生自我反思報告的內容深度","網頁修改次數"],ans:2,exp:"自我反思報告需要質性分析，無法直接量化，是質化指標。其他三者均可計數，屬於量化指標。"},
    {q:"「改了兩版還是一樣挫折」這個阻力，最根本的問題是？",opts:["學生不夠努力","學生不知道評審標準在哪裡（期望路徑不清）","教師沒有給足夠時間","作業太難"],ans:1,exp:"這個阻力源自期望理論中的工具性斷裂——學生不清楚「做什麼樣的改善」才能換來認可，需要明確標準。"},
    {q:"當學生「中途失去興趣」時，最適合使用哪個理論來介入？",opts:["自我效能理論","期望理論","自我決定論","三需求理論"],ans:3,exp:"三需求理論幫助釐清：學生的成就、親和或權力需求，哪一個在當前設計中沒有被滿足，進而調整策略。"},
    {q:"「迭代次數」作為評估指標，測量的核心能力是？",opts:["學習時間的長短","對回饋的重視程度與主動改善意願","記憶力","與同學的協作能力"],ans:1,exp:"迭代次數反映的不只是技術能力，更是一種思維模式——願意根據回饋反覆改善，正是業界最看重的特質之一。"},
    {q:"這套動機轉換系統的設計哲學，最接近以下哪個描述？",opts:["用外部壓力強制學生行動","讓學習變得更簡單，讓學生不需要付出太多","創造條件讓學生由內而外地想要行動和成長","用獎懲機制控制學生行為"],ans:2,exp:"整套系統的設計核心是「創造內部動機的條件」——透過自主性、勝任感、連結感、楷模學習等機制，讓學生自發行動。"}
  ],

  m1_nav:"1. Three-Gap Diagnosis",m1_title:"Understanding the Three Gaps",
  m1_p1:"Before entering the workforce, Taiwanese students' motivation systems typically need a complete 'engine overhaul.' This is not a personal failure—it's a structural consequence of the education system design. Three typical gap challenges emerge when facing open-ended, standard-answer-free industry challenges.",
  m1_p2:"'The first time I was asked what unique insight I had about this role, my mind went blank—because no one had ever asked me to think for myself.' — A typical motivation gap experience",
  m1_cards:[
    {icon:"🔌",title:"Motivation Gap",desc:"Accustomed to standard answers, lacking internal drive for proactive exploration. Tends to wait for instructions rather than take initiative."},
    {icon:"🏗️",title:"Experience Gap",desc:"Lack of practical experience leading to self-doubt when facing real industries. 'I've never done this' becomes a reason to avoid trying."},
    {icon:"🔗",title:"Value Gap",desc:"Cannot see the connection between classroom learning and high-value career opportunities. Effort feels meaningless without visible purpose."}
  ],
  m1_diag_title:"Quick Self-Diagnosis Checklist",
  m1_diag:[
    {q:"I can name 3+ industries I'm interested in and explain why.",layer:"Motivation Gap"},
    {q:"I've independently completed a project requiring research and decision-making.",layer:"Experience Gap"},
    {q:"I can connect what I learned in a course to a specific job requirement.",layer:"Value Gap"},
    {q:"When facing new tasks, I tend to try proactively rather than wait for instructions.",layer:"Motivation Gap"},
    {q:"I clearly understand the gap between my current skills and my target job requirements.",layer:"Value Gap"}
  ],
  m1_terms:[
    {front:"Motivation Gap",back:"Accustomed to external evaluation driving learning. Tends to avoid open-ended challenges rather than attempt them. The core symptom: waiting for instructions."},
    {front:"Experience Gap",back:"Self-doubt arising from lack of practical experience. Creates a vicious cycle of 'never done it, so afraid to try,' blocking new attempts and growth."},
    {front:"Value Gap",back:"Inability to see the connection between learning investment and career returns, leading to weak motivation and lack of direction."}
  ],
  m1_q:[
    {q:"Which best describes the core problem of the 'Motivation Gap'?",opts:["Lack of work experience","Habituated to standard answers, lacking proactive drive","Unaware of salary levels","Cannot write English resumes"],ans:1,exp:"The Motivation Gap refers to weak internal drive caused by long-term external motivation, leading to avoidance of open-ended challenges."},
    {q:"The 'Value Gap' primarily reflects which challenge?",opts:["Low salary","Cannot see the connection between learning and career benefits","Disliking current major","Intense peer competition"],ans:1,exp:"The Value Gap means students cannot perceive the relationship between learning effort and career returns."},
    {q:"Which gap is most effectively addressed through 'role model learning'?",opts:["Motivation Gap","Value Gap","Experience Gap","None of the above"],ans:2,exp:"The Experience Gap's core is 'afraid to try because never done it.' Seeing role models succeed effectively lowers psychological barriers."},
    {q:"Which scenario best illustrates the 'Experience Gap'?",opts:["Student doesn't know what job to apply for","Student reads a JD but can't map it to their learning","Student has no internship and feels they have no skills","Student dislikes group projects"],ans:2,exp:"The Experience Gap's typical manifestation: systematic self-doubt arising from lack of practical experience."},
    {q:"In the self-diagnosis checklist, which question best targets the 'Value Gap'?",opts:["I can name industries I'm interested in","I've completed a self-directed project","I can connect course learning to specific job requirements","I proactively attempt new tasks"],ans:2,exp:"'Connecting course learning to job requirements' directly measures whether students can see the value connection between learning and career."},
    {q:"The 'engine overhaul' metaphor refers to?",opts:["Switching to a new major","Rebuilding the motivation system from external to internal drive","Buying a new computer","Finding a high-paying job"],ans:1,exp:"'Engine overhaul' describes the need to shift from relying on external evaluation to being driven by internal goals and curiosity."},
    {q:"Which gap most directly affects 'deciding which companies to apply to'?",opts:["Motivation Gap","Experience Gap","Value Gap","All equally"],ans:2,exp:"The Value Gap prevents students from seeing connections between their learning and industry needs, making it hard to identify relevant opportunities."},
    {q:"Which teaching intervention most effectively addresses all three gaps simultaneously?",opts:["More exam questions","Asking students to analyze real JDs and map to their own skills","Weekly quizzes","Mandatory internship hours"],ans:1,exp:"Analyzing real JDs and mapping skills simultaneously activates proactive exploration (motivation), builds analysis experience (experience), and reveals connections (value)."}
  ],
  m2_nav:"2. Four Motivation Theories",m2_title:"Integrated Framework of Four Motivation Theories",
  m2_p1:"To address the three structural gaps, we integrate four evidence-based motivation theories. These theories are not randomly listed—they are sequentially introduced according to different learning stages, forming a complete motivation upgrade pathway from early autonomy cultivation to later personalized strategy development.",
  m2_p2:"'The best motivation system makes students feel they WANT to do something, not that they MUST do it.' — The core spirit of Self-Determination Theory",
  m2_theories:[
    {icon:"🌱",title:"Self-Determination Theory (SDT)",timing:"Early Stage (Week 1-2)",desc:"Convert external pressure into internal motivation by granting project autonomy, building incremental competence, and connecting to real industry. Three core needs: Autonomy, Competence, Relatedness."},
    {icon:"💪",title:"Self-Efficacy Theory",timing:"Middle Stage (Week 3-5)",desc:"Help zero-experience students build 'I can do it' confidence through task decomposition and role model learning. Key tool: accumulating micro-successes."},
    {icon:"🎯",title:"Expectancy Theory",timing:"Late Stage (Week 6-8)",desc:"Open the realistic pathway of 'effort → professional output → career advantage' to build powerful incentives. Students must believe effort is meaningful and outcomes are valuable."},
    {icon:"🧭",title:"Three Needs Theory",timing:"Integration (Week 9+)",desc:"Guide students to discover whether they are driven by achievement, power, or affiliation needs, then develop personalized career strategies to find the most suitable direction."}
  ],
  m2_terms:[
    {front:"Self-Determination Theory (SDT)",back:"Proposed by Deci & Ryan. Emphasizes three basic psychological needs: Autonomy, Competence, and Relatedness. When all three are satisfied, intrinsic motivation is strongest."},
    {front:"Self-Efficacy",back:"Proposed by Bandura. Refers to one's belief in their ability to complete specific tasks. Can be enhanced through micro-successes, observing role models, and social persuasion."},
    {front:"Expectancy Theory",back:"Proposed by Vroom. Motivation = Expectancy × Instrumentality × Valence. Students must believe: effort→outcome (Expectancy), outcome→reward (Instrumentality), reward is meaningful (Valence)."}
  ],
  m2_q:[
    {q:"What are the three basic psychological needs in SDT?",opts:["Achievement, competitiveness, salary","Autonomy, Competence, Relatedness","Effort, ability, opportunity","Interest, skills, network"],ans:1,exp:"SDT's three core needs are: Autonomy, Competence, and Relatedness."},
    {q:"According to the intervention sequence, which stage does 'Expectancy Theory' mainly apply?",opts:["Early Stage (Week 1-2)","Middle Stage (Week 3-5)","Late Stage (Week 6-8)","Integration (Week 9+)"],ans:2,exp:"Expectancy Theory intervenes in the late stage, when students have foundations and need a clear pathway of effort→outcome→reward."},
    {q:"'Role model learning' is a core tool of which theory?",opts:["SDT","Self-Efficacy Theory","Expectancy Theory","Three Needs Theory"],ans:1,exp:"Bandura's Self-Efficacy Theory emphasizes observing role models' success to build one's own belief of 'I can do it too.'"},
    {q:"Students with high Achievement Needs (nAch) are most suited to?",opts:["Public relations with heavy social interaction","Management requiring directing others","Project work with clear goals and challenges","Stable, repetitive administrative work"],ans:2,exp:"High nAch individuals are driven by challenging goals and are best suited for project work with clear outcome metrics."},
    {q:"In Expectancy Theory, if a student believes 'effort won't lead to good results,' which element is broken?",opts:["Valence","Instrumentality","Expectancy","All of the above"],ans:2,exp:"Expectancy refers to the belief that effort→outcome. When this link breaks, the entire motivation formula approaches zero."},
    {q:"In SDT, 'giving students autonomy to choose their industry' primarily satisfies which need?",opts:["Competence","Relatedness","Autonomy","Achievement Need"],ans:2,exp:"Letting students freely choose their industry directly satisfies SDT's Autonomy need—the core design of the unfreezing stage."},
    {q:"The 'micro-success' strategy primarily comes from which theory?",opts:["Expectancy Theory","Three Needs Theory","Self-Efficacy Theory","SDT"],ans:2,exp:"Self-Efficacy Theory emphasizes decomposing tasks and accumulating small wins to gradually build 'I can do it' confidence."},
    {q:"Which theory best helps students 'find a career direction that suits their personality'?",opts:["Self-Efficacy Theory","Expectancy Theory","SDT","Three Needs Theory"],ans:3,exp:"Three Needs Theory (McClelland) analyzes individual achievement, power, and affiliation need tendencies to develop personalized career strategies."}
  ],
  m3_nav:"3. Four-Stage Execution",m3_title:"Four-Stage Execution: From Unfreezing to Practice",
  m3_p1:"Theoretical frameworks must be translated into actionable teaching flows. This execution system guides students from 'macro (industry)' to 'micro (self)' through four clearly defined stages. Each stage includes specific timing recommendations, core deliverables, and checkpoints.",
  m3_p2:"'A good process design makes students feel concrete progress at every checkpoint. That sense of competence is the fuel for the next step.'",
  m3_stages:[
    {num:"01",title:"Unfreeze & Empower",weeks:"Week 1-2",color:"bg-[#004030]",output:"Personal Industry Interest List",check:"1-minute justification pitch",desc:"Break exam mindset. Give students the right to autonomously choose their industry. Remove 'what if I choose wrong' anxiety by lowering barriers instead of raising pressure."},
    {num:"02",title:"Expand Industry Knowledge",weeks:"Week 3-5",color:"bg-[#048A81]",output:"JD Analysis Table + BMC",check:"Peer review with rubric",desc:"By deconstructing real Job Descriptions and Business Model Canvases, build concrete understanding of industry ecosystems to replace vague 'feelings.'"},
    {num:"03",title:"Build Micro-Successes",weeks:"Week 6-7",color:"bg-[#54C6EB]",output:"Skill Gap Table + Action Plan",check:"1-on-1 teacher feedback",desc:"Inventory current skills vs. market demands and develop executable improvement strategies. Transform 'I know nothing' into 'I know what to do next.'"},
    {num:"04",title:"Practice & Continuous Improvement",weeks:"Week 8-12",color:"bg-[#D8C3A5]",output:"Interactive Webpage + Revision Record",check:"Mock interview pitch (8 min)",desc:"Build a digital portfolio, receive industry mock reviews, and iterate based on feedback. Learn the industry mindset of 'unafraid to fail, committed to continuous improvement.'"}
  ],
  m3_terms:[
    {front:"Job Description (JD) Deconstruction",back:"Systematically analyze JDs into: required hard skills, preferred soft skills, company culture clues, and implicit expectations. The key tool connecting 'market demands' to 'personal current state.'"},
    {front:"Business Model Canvas (BMC)",back:"Nine-block framework by Osterwalder covering value proposition, customer segments, revenue streams, and six other elements. Helps students understand how a company 'makes money and survives.'"},
    {front:"Iterative Mindset",back:"From agile development culture: 'quick output → feedback → improve → output again.' In career preparation, demonstrating iterative thinking is more valuable than producing a perfect first version."}
  ],
  m3_q:[
    {q:"What is the main goal of the 'Unfreeze & Empower' stage?",opts:["Teach students to write business plans","Break passive mindset and build proactive exploration drive","Help students find internships","Force students to commit to a career direction"],ans:1,exp:"Unfreezing focuses on breaking exam mindset and letting students experience 'I can choose,' not on giving directives."},
    {q:"What are the core deliverables of the 'Expand Knowledge' stage?",opts:["Personal resume","JD analysis table + BMC","Career planning report","Book report"],ans:1,exp:"This stage requires analyzing real JDs and drawing target company BMCs to build concrete industry knowledge."},
    {q:"What does the Business Model Canvas (BMC) mainly help students understand?",opts:["How to write an English resume","How a company makes money and survives","How to prepare interview questions","How to calculate salary expectations"],ans:1,exp:"BMC is a nine-block framework for systematically analyzing a company's business model including value proposition, customers, and revenue streams."},
    {q:"What is the key mindset emphasized in Stage 4 'Practice & Continuous Improvement'?",opts:["Perfect the first attempt","Iterative thinking: unafraid to fail, committed to improvement","Wait until fully prepared","Avoid criticism and correction"],ans:1,exp:"This stage deliberately designs feedback-improvement cycles to cultivate the iterative mindset valued by industry, not first-attempt perfection."},
    {q:"Which dimension is NOT part of the mock review scoring?",opts:["Logical clarity","Industry understanding depth","English pronunciation accuracy","Self-awareness precision"],ans:2,exp:"The four scoring dimensions are: Logical clarity, Industry understanding depth, Self-awareness precision, and Growth potential. English pronunciation is not included."},
    {q:"What three elements does the 'Feedback Absorption Sheet' require students to record?",opts:["Problem, answer, score","Key criticism received → my understanding → how to improve in v2","Strengths, weaknesses, suggestions","Time, place, people"],ans:1,exp:"The sheet records: key criticism received → my understanding → how to improve next version, cultivating active feedback absorption."},
    {q:"Which theory-stage pairing is most accurate?",opts:["Unfreezing→Expectancy Theory","Expanding Knowledge→Three Needs Theory","Building Micro-Successes→Self-Efficacy Theory","Practice→SDT"],ans:2,exp:"Building Micro-Successes corresponds to Self-Efficacy Theory—accumulating small concrete achievements to build 'I can do it' confidence."},
    {q:"What is the primary function of the 'Skill Gap Table'?",opts:["List all courses taken","Visually compare market demands vs. personal current skills","Plan daily study schedule","Calculate GPA ranking"],ans:1,exp:"The Skill Gap Table helps students clearly see the gap between 'what the market wants' and 'what I currently have,' enabling targeted improvement planning."}
  ],
  m4_nav:"4. Digital Portfolio",m4_title:"Interactive Webpage: Your Digital Portfolio",
  m4_p1:"The final analysis output should not be a paper report—it should be an interactive webpage that can be directly shown to interviewers. This 'digital portfolio' serves dual functions as a learning showcase and a job-search tool, allowing interviewers to fully assess your thinking ability and execution capacity within 5 minutes.",
  m4_p2:"'Interviewers see dozens of resumes daily. An interactive webpage is the best reason for them to stop and look for 3 more minutes.'",
  m4_modules:[
    {num:"M1",icon:"🏠",title:"Home & Value Proposition",timing:"First 10 seconds",desc:"One-sentence positioning + core drive statement + navigation flow. Let interviewers know 'who you are and what problem you care about' in the first second."},
    {num:"M2",icon:"🌐",title:"Industry Trends & Business Models",timing:"Second 11-60",desc:"Target company BMC visualization + pain point insights + personal rationale. Demonstrates macro vision and independent judgment."},
    {num:"M3",icon:"🎯",title:"Career Strategy & Skill Mapping",timing:"Minutes 1-3",desc:"JD breakdown table + radar chart (demand vs. current state) + concrete action plan. Shows precise self-awareness."},
    {num:"M4",icon:"📁",title:"Portfolio & Continuous Improvement",timing:"Minutes 3-5",desc:"Micro-project showcase + feedback improvement journey (v1→criticism→v2). Proves execution capacity through concrete output and iteration records."}
  ],

  ],
  m4_terms:[
    {front:"Personal Value Proposition",back:"A one-sentence statement answering: who you are, what problem you solve, and what differentiates you from other candidates. Example: 'A project management candidate with AI application thinking.'"},
    {front:"Radar Chart",back:"A multi-dimensional comparison visualization tool. In career preparation, used to contrast 'market-required skill distribution' with 'personal current skill distribution'—intuitively showing strengths and gaps."},
    {front:"Digital Portfolio",back:"An online showcase integrating personal analysis outputs, project work, and career strategy. Serves dual functions of job-search tool and personal brand building, demonstrating deeper thinking than traditional resumes."}
  ],
  m4_q:[
    {q:"The biggest advantage of a digital portfolio over a traditional resume is?",opts:["Can include more photos","Better showcases depth of thinking and execution process","No time needed to create it","Avoids interviews"],ans:1,exp:"Digital portfolios show analytical processes, iterative thinking, and concrete outcomes, giving interviewers a sense of 'thinking depth' that PDF resumes cannot achieve."},
    {q:"In the 'first 10 seconds,' what do interviewers most want to see?",opts:["Detailed academic history","Who this person is and what problem they care about (positioning)","A complete project list","GPA and scholarship records"],ans:1,exp:"The first 10 seconds is the critical 'worth continuing?' decision point. Clarity of personal positioning determines whether the interviewer reads on."},
    {q:"A 'Personal Value Proposition' should include which three elements?",opts:["Name, department, GPA","Who you are, what problem you solve, your differentiation","Work experience, skills, languages","Interests, personality, family background"],ans:1,exp:"A Value Proposition must answer: who I am (identity), what I can do (capability), and how I differ from others (differentiation)."},
    {q:"What is the main use of a radar chart in a digital portfolio?",opts:["Show interest distribution","Visually compare market-required vs. personal skill gaps","Display academic grades","Compare salaries across companies"],ans:1,exp:"Radar charts intuitively show the contrast between 'what the market requires' and 'what I currently have' across multiple skill dimensions."},
    {q:"What should the fourth module 'Portfolio' most emphasize?",opts:["Only show successful outputs","Show the iterative journey: v1 draft → criticism received → v2 improvement","List all courses taken","Provide thick report documents"],ans:1,exp:"The iteration journey (feedback→improve→output again) is the most compelling demonstration of industry thinking, more persuasive than just showing perfect final results."},
    {q:"For students without programming skills, which tool is best for quickly building a webpage?",opts:["React + TypeScript","Notion or Gamma.app","C++ programming","Adobe Photoshop"],ans:1,exp:"Notion and Gamma.app are zero-code tools, suitable for students needing quick launch while focusing on content quality."},
    {q:"The module sequence in a digital portfolio follows what logic?",opts:["Alphabetical order","Random arrangement","Corresponding to interviewer reading psychology (positioning→vision→self-awareness→execution)","Ordered by production difficulty"],ans:2,exp:"The four modules are deliberately sequenced to match interviewer evaluation psychology: confirm positioning → verify vision → check self-awareness → assess execution."},

  m5_nav:"5. Resistance to Transformation",m5_title:"Resistance to Transformation: Managing Obstacles & Measuring Effectiveness",
  m5_p1:"Changing motivation is a journey full of resistance. The value of this Resistance to Transformation framework lies not only in 'the path when things go smoothly' but in 'the response mechanism when facing resistance.' Recognizing obstacles, understanding root causes, and finding strategies is what makes motivation transformation truly happen. Clear evaluation metrics tell us whether the system is genuinely working.",

  m5_obstacles:[
    {problem:"Don't know which industry to choose",cause:"Motivation Gap: habituated to waiting for instructions",
     action_strategy:"Open 104 or LinkedIn and pick 3 industry names based on gut feel. Write them down. No justification needed. That's step one done.",
     solution:"Lower the choice barrier first — autonomy returns when options feel manageable (SDT Autonomy)",

    {problem:"Work not good enough, reluctant to share",cause:"Experience Gap: fear of judgment",
     action_strategy:"Share just one minimum unit: one chart, one paragraph, or one finding. Your message can say: This is still a work in progress, please just look at this part. Perfection is not the entry ticket.",
     solution:"Start with the smallest shareable unit — competence grows through small accepted successes (SDT Competence)",
     theory:"SDT Competence",theoryColor:"bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300",
     reflect:["Where does your good enough standard come from? Your own judgment, or what you imagine others expect?","Is there even one part of your work that you feel is not bad?","If you could only show one chart or paragraph, what would you most want people to see?"],

// ── ModuleQuiz ────────────────────────────────────
const ModuleQuiz=({questions,t,moduleId,onQuizSubmit})=>{
  const [quizIndices]=useState(()=>[...Array(questions.length).keys()].sort(()=>Math.random()-0.5).slice(0,4));
  const [selected,setSelected]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const [score,setScore]=useState(0);
  const quizQs=quizIndices.map(i=>({...questions[i],_idx:i}));
  const handleSubmit=()=>{
    if(Object.keys(selected).length<quizQs.length)return;
    const sc=quizQs.filter((q,i)=>selected[i]===q.ans).length;
    setScore(sc);
    setSubmitted(true);
    onQuizSubmit(moduleId,sc,quizQs.length);
  };
  const handleRetry=()=>{setSelected({});setSubmitted(false);setScore(0);};
  return(
    <div className="mt-8 bg-slate-50 dark:bg-slate-900 rounded-2xl p-6">
      <h3 className="font-serif font-bold text-lg text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center gap-2">
        <IconActivity size={20}/>{t.quiz_title}
      </h3>
      <div className="space-y-6">
        {quizQs.map((q,qi)=>{
          const cur=questions[q._idx];
          return(
            <div key={qi} className="space-y-2">
              <p className="font-medium text-slate-800 dark:text-slate-200 text-sm">{qi+1}. {cur.q}</p>
              <div className="grid gap-2">
                {cur.opts.map((opt,oi)=>{
                  let cls="text-left w-full px-4 py-2.5 rounded-lg text-sm border transition-all ";
                  if(!submitted){cls+=selected[qi]===oi?"border-[#004030] bg-[#004030]/10 text-[#004030] dark:border-[#D8C3A5] dark:bg-[#D8C3A5]/10 dark:text-[#D8C3A5]":"border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 hover:border-[#004030] dark:hover:border-[#D8C3A5]";}
                  else{if(oi===q.ans)cls+="border-green-500 bg-green-50 dark:bg-green-900/30 text-green-800 dark:text-green-300 font-medium";else if(selected[qi]===oi&&oi!==q.ans)cls+="border-red-400 bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-300";else cls+="border-slate-200 dark:border-slate-700 text-slate-500";}
                  return<button key={oi} className={cls} disabled={submitted} onClick={()=>!submitted&&setSelected({...selected,[qi]:oi})}>{opt}</button>;
                })}
              </div>
              {submitted&&<p className="text-xs text-slate-500 dark:text-slate-400 mt-1 pl-1">💡 {t.explanation}：{cur.exp}</p>}
            </div>
          );
        })}
      </div>
      {!submitted?(
        <button onClick={handleSubmit} disabled={Object.keys(selected).length<quizQs.length}
          className="mt-6 w-full py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-xl disabled:opacity-40 hover:bg-[#002b20] dark:hover:bg-white transition-colors">
          {t.submit}
        </button>
      ):(
        <div className="mt-6 flex items-center justify-between">
          <p className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5]">{t.score}: {score}/{quizQs.length}</p>
          <button onClick={handleRetry} className="px-4 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] rounded-lg text-sm hover:bg-[#004030]/5">{t.retry}</button>
        </div>
      )}
    </div>
  );
};

const MotivationDiagnosisLab=({lang})=>{
  // Q1,Q4 → Motivation Gap; Q2,Q5 → Experience Gap; Q3 → Value Gap
  // Score 1=不符合(斷層大) 5=符合(斷層小) → gap severity = 6 - score
  const labels=lang==='zh'?
    ["我能說出3個以上感興趣的產業","我曾完成過自主決策的專案","我能將課程連結到具體職缺","面對新任務我傾向主動嘗試","我清楚自身技能與職缺的落差"]:
    ["I can name 3+ industries I'm interested in","I've completed a self-directed project","I can link courses to specific job requirements","I proactively attempt new tasks","I know my skill gaps vs. job requirements"];
  const gapKeys=lang==='zh'?
    ["動機斷層","經驗斷層","價值斷層","動機斷層","經驗斷層"]:
    ["Motivation Gap","Experience Gap","Value Gap","Motivation Gap","Experience Gap"];
  const [scores,setScores]=useState([3,3,3,3,3]);
  const title=lang==='zh'?"🔍 三斷層自我診斷量表":"🔍 Three-Gap Self-Diagnosis";
  const subtitle=lang==='zh'?
    "為每項評分（1=完全不符合，5=完全符合），分數越低代表該斷層越需要關注":
    "Rate each item (1=Strongly Disagree, 5=Strongly Agree) — lower scores = gap needs more attention";

  // Group by gap type, compute average score per gap (1-5)
  const gapNames=lang==='zh'?["動機斷層","經驗斷層","價值斷層"]:["Motivation Gap","Experience Gap","Value Gap"];
  const gapTotals={};
  const gapCounts={};
  gapNames.forEach(g=>{gapTotals[g]=0;gapCounts[g]=0;});
  scores.forEach((s,i)=>{const g=gapKeys[i];gapTotals[g]+=s;gapCounts[g]++;});

  // Gap severity = average gap score inverted: severity = 6 - avg (range 1-5, higher = more severe)
  const gapData=gapNames.map(name=>{
    const avg=gapTotals[name]/gapCounts[name];          // 1-5: higher = more aligned
    const severity=Math.round((6-avg)*10)/10;           // 1-5: higher = more severe gap
    const pct=Math.round((severity-1)/4*100);           // 0-100%
    return{name,avg:Math.round(avg*10)/10,severity,pct,count:gapCounts[name]};
  });

  // Color: red=severe, yellow=moderate, green=small gap
  const barColor=(pct)=>pct>=70?"bg-red-500":pct>=40?"bg-yellow-500":"bg-green-500";
  const severityLabel=(pct,isZh)=>{
    if(pct>=70)return isZh?"需要優先關注":"Needs attention";
    if(pct>=40)return isZh?"中度斷層":"Moderate gap";
    return isZh?"狀況良好":"Good";
  };

  return(
    <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-1">{title}</h3>
      <p className="text-xs text-slate-500 dark:text-slate-400 mb-5">{subtitle}</p>
      <div className="space-y-4">
        {labels.map((label,i)=>(
          <div key={i}>
            <div className="flex justify-between items-center mb-1">
              <span className="text-xs text-slate-600 dark:text-slate-300 flex-1 pr-4">{label}</span>
              <div className="flex items-center gap-1">
                {[1,2,3,4,5].map(v=>(
                  <button key={v} onClick={()=>{const n=[...scores];n[i]=v;setScores(n);}}
                    className={`w-7 h-7 rounded-lg text-xs font-bold transition-all ${scores[i]===v?'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030]':'bg-slate-100 dark:bg-slate-700 text-slate-500 hover:bg-[#004030]/20'}`}>{v}</button>
                ))}
              </div>
            </div>
            <div className="text-right"><span className="text-xs text-slate-400">{gapKeys[i]}</span></div>
          </div>
        ))}
      </div>
      <div className="mt-6 space-y-3">
        <div className="flex items-center justify-between mb-1">
          <p className="text-xs font-bold text-slate-500 uppercase tracking-wider">{lang==='zh'?'斷層嚴重度分析':'Gap Severity Analysis'}</p>
          <p className="text-xs text-slate-400">{lang==='zh'?'紅色=需關注，綠色=良好':'Red=needs attention, Green=good'}</p>
        </div>
        {gapData.map((g,i)=>(
          <div key={i} className="flex items-center gap-3">
            <span className="text-xs text-slate-600 dark:text-slate-300 w-20 shrink-0">{g.name}</span>
            <div className="flex-1 bg-slate-100 dark:bg-slate-700 rounded-full h-3">
              <div className={`h-3 rounded-full transition-all ${barColor(g.pct)}`} style={{width:`${Math.max(4,g.pct)}%`}}/>
            </div>
            <span className={`text-xs font-bold w-6 shrink-0 ${barColor(g.pct).replace('bg-','text-')}`}>{g.severity}</span>
            <span className="text-xs text-slate-400 w-20 shrink-0">{severityLabel(g.pct,lang==='zh')}</span>
          </div>
        ))}
        <p className="text-xs text-slate-400 italic mt-2">{lang==='zh'?`計算方式：各題「符合度」平均後取反（嚴重度 = 6 − 平均分），動機/經驗斷層各含 2 題，價值斷層含 1 題`:`Severity = 6 − average alignment score. Motivation/Experience gaps include 2 questions each; Value gap includes 1.`}</p>
      </div>
    </div>
  );
};

const ExpectancyCalcLab=({lang})=>{
  const [E,setE]=useState(3);
  const [I,setI]=useState(3);
  const [V,setV]=useState(3);
  // Correct formula: M = E × I × V, range 1–125
  const M=E*I*V;
  const maxM=125; // 5×5×5
  const pct=Math.round((M-1)/(maxM-1)*100); // normalize 1-125 → 0-100%
  const label=lang==='zh'?["期望值 E（努力能看到進步的信心）","工具性 I（進步能帶來機會的程度）","誘因值 V（你對這個機會的重視度）"]:["Expectancy E (confidence effort→progress)","Instrumentality I (progress→opportunity)","Valence V (how much you value it)"];
  const title=lang==='zh'?"⚡ 期望理論動機計算器":"⚡ Expectancy Theory Calculator";
  const subtitle=lang==='zh'?"M = E × I × V（每項 1–5 分，最大值 125）":"M = E × I × V (each 1–5, max 125)";
  const mLabel=lang==='zh'?"動機強度 M":"Motivation Score M";
  const interpretation=lang==='zh'?
    (pct>=70?"動機充足，繼續保持！":pct>=35?"動機中等，找出最低的那個維度優先改善":"動機偏低，建議先從最容易提升的維度著手"):
    (pct>=70?"Strong motivation — keep going!":pct>=35?"Moderate — find your lowest dimension and improve it first":"Low motivation — start with the easiest dimension to improve");
  const color=pct>=70?"text-green-600 dark:text-green-400":pct>=35?"text-yellow-600 dark:text-yellow-400":"text-red-600 dark:text-red-400";
  const barCls=pct>=70?"bg-green-500":pct>=35?"bg-yellow-500":"bg-red-500";
  return(
    <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="font-serif font-bold text-[#004030] dark:text-[#D8C3A5] mb-1">{title}</h3>
      <p className="text-xs text-slate-500 dark:text-slate-400 mb-5">{subtitle}</p>
      {[[E,setE,label[0]],[I,setI,label[1]],[V,setV,label[2]]].map(([val,setter,lbl],i)=>(
        <div key={i} className="mb-4">
          <div className="flex justify-between mb-1">
            <span className="text-xs text-slate-600 dark:text-slate-300">{lbl}</span>
            <span className="text-xs font-bold text-[#004030] dark:text-[#D8C3A5]">{val}/5</span>
          </div>
          <input type="range" min="1" max="5" step="1" value={val} onChange={e=>setter(+e.target.value)}
            className="w-full accent-[#004030]"/>
        </div>
      ))}
      <div className="mt-4 p-4 bg-slate-50 dark:bg-slate-900 rounded-xl text-center">
        <p className="text-xs text-slate-500 mb-1">{mLabel}</p>
        <p className={`text-4xl font-black font-serif ${color}`}>{M}</p>
        <p className="text-xs text-slate-400 mt-0.5">{lang==='zh'?`/ ${maxM} 最大值`:`/ ${maxM} max`}</p>
        <div className="mt-3 bg-slate-200 dark:bg-slate-700 rounded-full h-3">
          <div className={`h-3 rounded-full transition-all ${barCls}`} style={{width:`${Math.max(2,pct)}%`}}/>
        </div>
        <p className={`text-xs font-bold mt-2 ${color}`}>{interpretation}</p>
        <p className="text-xs text-slate-400 mt-1">{pct}% {lang==='zh'?'（相對最大動機值）':'(relative to max)'}</p>
      </div>
    </div>
  );
};

const ObstacleCards=({obstacles,lang,onProgressChange})=>{

  const toggleCheck=(i)=>{
    const next={...checked,[i]:!checked[i]};
    setChecked(next);
    // Auto-uncollapse when checking
    if(!checked[i])setCollapsed(c=>({...c,[i]:false}));
    if(onProgressChange)onProgressChange(next,actions);

  const updateAction=(i,val)=>{
    const next={...actions,[i]:val};

                      {step<o.reflect.length-1?(
                        <button onClick={()=>setReflectStep(s=>({...s,[i]:Math.min(o.reflect.length-1,(s[i]||0)+1)}))}

                {/* My next action input */}
                <div className="p-4">
                  <p className="text-xs font-bold text-slate-600 dark:text-slate-300 uppercase tracking-wider mb-1">{lAction}</p>

                  />
                  <div className="mt-2 flex items-center justify-between">
                    {hasAction?(
                      <p className="text-xs text-green-600 dark:text-green-400 flex items-center gap-1">
                        <IconCheckCircle size={12}/>{lang==='zh'?'行動計劃已記錄 ✓':'Action plan saved ✓'}

          </div>
        );
      })}
    </div>
  );
};

      const header=`${t.analytics_group},${t.analytics_dept},${t.analytics_id},${t.analytics_name},${lang==='zh'?'匯出日期':'Export Date'}\n${aForm.group},${aForm.dept},${aForm.id},${aForm.name},${today.toLocaleDateString()}\n\n`;
      const timeHeader=`${lang==='zh'?'模組瀏覽時間':'Module Browse Time'}\n${t.analytics_module},${t.analytics_time}(${t.analytics_sec}),${t.analytics_clicks}(${t.analytics_times})\n`;
      const timeRows=navItems.map((n,i)=>`${n.label},${analytics[i].time},${analytics[i].clicks}`).join('\n');
      const quizHeader=`\n\n${lang==='zh'?'測驗記錄（主題1-5）':'Quiz Record (Modules 1-5)'}\n${t.analytics_module},${lang==='zh'?'答對題數':'Correct'},${lang==='zh'?'作答題數':'Answered'},${lang==='zh'?'總題數':'Total'}\n`;
      const quizRows=quizModules.map((n,i)=>{
        const a=quizAnalytics[i];
        // Wrap in quotes to prevent Excel date auto-conversion
        if(a.answered>0)return`${n.label},"${a.correct}","${a.answered}","${a.total}"`;
        return`${n.label},${t.analytics_no_data},,`;
      }).join('\n');
      const summary=`\n\n${t.analytics_total_time},${totalTime}${t.analytics_sec}\n${t.analytics_total_clicks},${totalClicks}${t.analytics_times}\n${t.analytics_overall_acc},${overallAcc}%`;
      const blob=new Blob([bom+header+timeHeader+timeRows+quizHeader+quizRows+summary],{type:'text/csv;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
    };
    return(
      <div className="space-y-8 animate-fade-in">
        <H2>{t.analytics_title}</H2>
        <p className="text-slate-600 dark:text-slate-400">{t.analytics_desc}</p>
        {/* Summary cards */}
        <div className="grid grid-cols-3 gap-4">
          {[
            {label:t.analytics_total_time,val:`${totalTime}${t.analytics_sec}`},
            {label:t.analytics_total_clicks,val:`${totalClicks}${t.analytics_times}`},
            {label:t.analytics_overall_acc,val:`${overallAcc}%`,sub:lang==='zh'?'M1-M5測驗':'M1-M5 quizzes'}
          ].map((s,i)=>(
            <div key={i} className="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 text-center">
              <p className="font-serif font-black text-3xl text-[#004030] dark:text-[#D8C3A5]">{s.val}</p>
              <p className="text-xs text-slate-500 mt-1">{s.label}</p>
              {s.sub&&<p className="text-xs text-slate-400 mt-0.5">{s.sub}</p>}
            </div>
          ))}
        </div>
        {/* Browse time — all modules */}
        <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden">
          <div className="px-5 py-3 bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700">
            <p className="text-xs font-bold text-slate-500 uppercase tracking-wider">{lang==='zh'?'模組瀏覽時間與互動次數':'Module Browse Time & Interactions'}</p>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-[#004030] text-white">
                <tr>{[t.analytics_module,`${t.analytics_time}(${t.analytics_sec})`,`${t.analytics_clicks}(${t.analytics_times})`].map((h,i)=><th key={i} className="px-4 py-3 text-left text-xs font-bold">{h}</th>)}</tr>
              </thead>
              <tbody>
                {navItems.map((n,i)=>{
                  const a=analytics[i];
                  return<tr key={i} className={`border-b border-slate-100 dark:border-slate-700 ${i===module?'bg-[#004030]/5 dark:bg-[#D8C3A5]/5':''}`}>
                    <td className="px-4 py-3 text-slate-700 dark:text-slate-300 text-xs">{n.label}</td>
                    <td className="px-4 py-3 text-slate-600 dark:text-slate-400 text-xs">{a.time}</td>
                    <td className="px-4 py-3 text-slate-600 dark:text-slate-400 text-xs">{a.clicks}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>
        {/* Quiz record — M1-M5 only */}
        <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden">
          <div className="px-5 py-3 bg-[#004030]/10 dark:bg-[#D8C3A5]/10 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
            <p className="text-xs font-bold text-[#004030] dark:text-[#D8C3A5] uppercase tracking-wider">{lang==='zh'?'📝 測驗記錄（主題 1-5）':'📝 Quiz Record (Modules 1-5)'}</p>
            <p className="text-xs text-slate-500">{lang==='zh'?'僅主題1-5含測驗':'Only M1-M5 include quizzes'}</p>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-[#004030] text-white">
                <tr>{[t.analytics_module,t.analytics_correct_ans_total].map((h,i)=><th key={i} className="px-4 py-3 text-left text-xs font-bold">{h}</th>)}</tr>
              </thead>
              <tbody>
                {quizModules.map((n,i)=>{
                  const a=quizAnalytics[i];
                  const acc=a.answered>0?`${a.correct}/${a.answered}/${a.total}`:t.analytics_no_data;
                  return<tr key={i} className="border-b border-slate-100 dark:border-slate-700">
                    <td className="px-4 py-3 text-slate-700 dark:text-slate-300 text-xs">{n.label}</td>
                    <td className="px-4 py-3 text-slate-600 dark:text-slate-400 text-xs">{acc}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </div>
        <div className="bg-slate-50 dark:bg-slate-900 rounded-2xl p-6">
          <h3 className="font-bold text-[#004030] dark:text-[#D8C3A5] mb-5">{t.analytics_form_title}</h3>
          <div className="grid sm:grid-cols-2 gap-4 mb-5">
            <div>
              <label className="block text-xs font-bold text-slate-500 mb-1">{t.analytics_group}</label>
              <select value={aForm.group} onChange={e=>setAForm({...aForm,group:e.target.value})}
                className="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 rounded-lg px-3 py-2 text-sm text-slate-700 dark:text-slate-300">
                {t.group_options.map(g=><option key={g}>{g}</option>)}
              </select>
            </div>
            {[['dept',t.analytics_dept,t.analytics_dept_ph],['id',t.analytics_id,t.analytics_id_ph],['name',t.analytics_name,t.analytics_name_ph]].map(([key,label,ph])=>(
              <div key={key}>
                <label className="block text-xs font-bold text-slate-500 mb-1">{label}</label>
                <input placeholder={ph} value={aForm[key]} onChange={e=>setAForm({...aForm,[key]:e.target.value})}
                  className="w-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 rounded-lg px-3 py-2 text-sm text-slate-700 dark:text-slate-300"/>
              </div>
            ))}
          </div>
          <button onClick={exportCSV} disabled={!formFilled}
            className="w-full py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-xl disabled:opacity-40 hover:bg-[#002b20] disabled:cursor-not-allowed transition-colors flex items-center justify-center gap-2">
            <IconActivity size={16}/>{formFilled?t.analytics_export_csv:t.analytics_fill_required}
          </button>
        </div>
      </div>
    );
  };

  const renderContent=()=>{
    switch(module){
      case 0:return renderM0();
      case 1:return renderM1();
      case 2:return renderM2();
      case 3:return renderM3();
      case 4:return renderM4();
      case 5:return renderM5();
      case 6:return renderResources();
      case 7:return renderLab();
      case 8:return renderAnalytics();
      default:return renderM0();
    }
  };

  return(
    <div className="h-screen flex flex-col bg-[#f4f4f4] dark:bg-[#121212] overflow-x-hidden">
      {/* Header */}
      <header className="fixed top-0 left-0 right-0 h-16 z-50 bg-[#004030] flex items-center justify-between px-4 shadow-lg">
        <div className="flex items-center gap-3">
          <button className="md:hidden text-[#D8C3A5] hover:text-white p-1" onClick={()=>setMenuOpen(!menuOpen)}>
            {menuOpen?<IconX size={22}/>:<IconMenu size={22}/>}
          </button>
          <button onClick={()=>{window.scrollTo({top:0,behavior:'smooth'});goModule(0);}} className="flex items-center gap-2">
            <span className="font-serif font-black text-[#D8C3A5] tracking-widest text-xl">MT</span>
            <span className="hidden sm:block text-white/70 text-xs font-medium">Motivation Transformation</span>
          </button>
        </div>
        <div className="flex items-center gap-1.5">
          {/* Play / Pause */}
          <button onClick={toggleTTS} title={speaking?lang==='zh'?'暂停':'Pause':ttsPaused?lang==='zh'?'繼續':'Resume':t.audio_read}
            className="flex items-center gap-1 px-2 py-1.5 text-[#D8C3A5] hover:text-white hover:bg-white/10 rounded-lg transition-colors text-xs">
            {speaking?<IconPause size={16}/>:ttsPaused?<IconPlay size={16}/>:<IconPlay size={16}/>}
            <span className="hidden sm:block">{speaking?lang==='zh'?'暫停':'Pause':ttsPaused?lang==='zh'?'繼續':'Resume':t.audio_read}</span>
          </button>
          {/* Stop — only show when active */}
          {(speaking||ttsPaused)&&(
            <button onClick={stopTTS} title={t.audio_stop}
              className="flex items-center gap-1 px-2 py-1.5 text-[#D8C3A5] hover:text-white hover:bg-white/10 rounded-lg transition-colors text-xs">
              <IconSquare size={14}/>
              <span className="hidden sm:block">{t.audio_stop}</span>
            </button>
          )}
          <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')}
            className="px-3 py-1.5 text-xs font-bold border border-[#D8C3A5]/50 text-[#D8C3A5] hover:bg-[#D8C3A5]/10 rounded-lg transition-colors">
            {lang==='zh'?'EN':'中'}
          </button>
          <button onClick={()=>setDark(d=>!d)} className="p-2 text-[#D8C3A5] hover:text-white transition-colors">
            {dark?<IconSun size={20}/>:<IconMoon size={20}/>}
          </button>
        </div>
      </header>

      {/* Mobile dropdown */}
      {menuOpen&&(
        <div ref={menuRef} className="fixed top-16 left-0 right-0 z-[100] bg-[#004030] border-t border-[#D8C3A5]/20 max-h-[calc(100vh-5rem)] overflow-y-auto">
          {navItems.map((item,i)=>(
            <button key={i} onClick={()=>goModule(i)}
              className={`w-full flex items-center gap-3 px-5 py-3.5 text-sm transition-colors ${module===i?'bg-[#D8C3A5]/20 text-[#D8C3A5]':'text-white/70 hover:text-white hover:bg-white/10'}`}>
              {item.icon}<span>{item.label}</span>
            </button>
          ))}
        </div>
      )}

      <div className="flex flex-1 overflow-hidden pt-16">
        {/* Sidebar */}
        <nav className="hidden md:flex flex-col w-64 shrink-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-700 overflow-y-auto">
          <div className="p-4 space-y-1">
            {navItems.map((item,i)=>(
              <button key={i} onClick={()=>goModule(i)}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all ${module===i?'bg-[#004030] text-white font-semibold':'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-[#004030] dark:hover:text-[#D8C3A5]'}`}>
                {item.icon}<span>{item.label}</span>
              </button>
            ))}
          </div>
        </nav>

        {/* Main */}
        <main ref={mainRef} className="flex-1 overflow-y-auto min-w-0">
          <div className="max-w-4xl mx-auto p-4 sm:p-6 md:p-8 pb-16">
            {renderContent()}
            {/* Bottom nav */}
            <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700">
              <button onClick={()=>goModule(Math.max(0,module-1))} disabled={module===0}
                className="px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] disabled:opacity-0 uppercase text-sm tracking-wider flex items-center gap-2">
                ← {t.nav_prev}
              </button>
              <button onClick={()=>goModule(Math.min(TOTAL-1,module+1))} disabled={module===TOTAL-1}
                className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white disabled:opacity-0 uppercase text-sm tracking-wider shadow-md flex items-center gap-2 rounded-xl">
                {t.nav_next}<IconArrowRight size={16}/>
              </button>
            </div>
          </div>
        </main>
      </div>

      {/* Footer */}
      <footer className="bg-[#004030] flex items-center justify-between px-4 py-1.5 shrink-0 gap-2 flex-wrap">
        <span className="text-[#D8C3A5]/60 text-xs">{t.date} · {t.copyright}</span>
        <div className="flex items-center gap-3">
          <button onClick={()=>{if(mainRef.current)mainRef.current.scrollTo({top:0,behavior:'smooth'});}}
            className="flex items-center gap-1 text-[#D8C3A5]/70 hover:text-white text-xs transition-colors group">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="group-hover:-translate-y-0.5 transition-transform"><polyline points="18 15 12 9 6 15"/></svg>
            Top {lang==='zh'?'回到頂端':''}
          </button>
          <span className="text-[#D8C3A5]/30 text-xs">|</span>
          <span className="text-[#D8C3A5]/60 text-xs flex items-center gap-1">
            Architect:&nbsp;
            <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" rel="noopener noreferrer"
              className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">
              Prof. Shihmin Lo
            </a>
          </span>
        </div>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
